<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <!--
    VCAG (View Coordinates As Graph) Icon
    - Theme: Data visualization, 2D/3D coordinates, graphs
    - Style: Modern flat design with a gradient
    - Compatibility: Works on both light and dark themes
    -->

    <!-- Background: A rounded square with a vibrant blue-to-cyan gradient. -->
    <defs>
        <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#007ACC;" />
            <stop offset="100%" style="stop-color:#48D1CC;" />
        </linearGradient>
    </defs>
    <rect width="128" height="128" rx="24" fill="url(#backgroundGradient)" />

    <!-- 3D Axes: Represents the 3D coordinate system (X, Y, Z). -->
    <g transform="translate(64, 64)" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.75">
        <!-- Z-axis (vertical) -->
        <line x1="0" y1="-45" x2="0" y2="45" />
        <!-- Y-axis (diagonal) -->
        <line x1="-40" y1="25" x2="40" y2="-25" />
        <!-- X-axis (diagonal) -->
        <line x1="40" y1="25" x2="-40" y2="-25" />
    </g>

    <!-- Data Visualization Elements: Represents a line graph and scatter plot points. -->
    <g>
        <!-- A bright yellow line connecting two points, suggesting a graph. -->
        <path d="M 50 85 C 68 65, 82 70, 95 55" fill="none" stroke="#FFEB3B" stroke-width="4.5" stroke-linecap="round" />

        <!-- Scatter plot points with various colors and sizes for a dynamic feel. -->
        <!-- Each point has a white border for better visibility on the gradient. -->
        <circle cx="50" cy="85" r="6" fill="#FF6B6B" stroke="white" stroke-width="2" />
        <circle cx="95" cy="55" r="6" fill="#4CAF50" stroke="white" stroke-width="2" />
        <circle cx="75" cy="45" r="4.5" fill="#FFFFFF" stroke="#333333" stroke-width="1" />
        <circle cx="40" cy="50" r="5" fill="#FFC107" stroke="white" stroke-width="2" />
        <circle cx="90" cy="90" r="4" fill="#2196F3" stroke="white" stroke-width="2" />
    </g>
</svg>
